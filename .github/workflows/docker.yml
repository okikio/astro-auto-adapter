name: Docker CI

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'src/**'
      - 'example/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'astro.config.ts'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'src/**'
      - 'example/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'astro.config.ts'
      - '.github/workflows/docker.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for provenance attestations (SLSA supply-chain security)
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Only push on non-PR events (pushes to main or tags)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image (standard)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Only push on non-PR events
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # OCI-compliant multi-platform builds
          platforms: linux/amd64,linux/arm64
          # Enable BuildKit cache for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # SLSA provenance attestation (OCI artifact)
          provenance: true
          # Software Bill of Materials (SBOM) attestation
          sbom: true
          # Pass build arguments for runtime configuration
          build-args: |
            ASTRO_ADAPTER_MODE=node
            ASTRO_OUTPUT_MODE=server

      # Attest the image digest for supply-chain security (non-PR only)
      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # Separate job to build OCI image format explicitly
  build-oci:
    name: Build OCI Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract OCI metadata
        id: oci-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-oci
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build OCI image artifact
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          # Validate OCI output on pull requests without publishing to GHCR.
          outputs: type=oci,dest=/tmp/astro-auto-adapter-oci.tar,oci-mediatypes=true
          labels: ${{ steps.oci-meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
          build-args: |
            ASTRO_ADAPTER_MODE=node
            ASTRO_OUTPUT_MODE=server

      - name: Verify OCI artifact was created
        if: github.event_name == 'pull_request'
        run: ls -lh /tmp/astro-auto-adapter-oci.tar

      - name: Build and push OCI image
        if: github.event_name != 'pull_request'
        id: oci-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.oci-meta.outputs.tags }}
          labels: ${{ steps.oci-meta.outputs.labels }}
          # Use OCI image format explicitly
          outputs: type=registry,oci-mediatypes=true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            ASTRO_ADAPTER_MODE=node
            ASTRO_OUTPUT_MODE=server

      - name: Generate OCI artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.oci-push.outputs.digest }}
          push-to-registry: true
