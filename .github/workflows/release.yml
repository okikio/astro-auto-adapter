name: Release

# Manually triggered release workflow.
#
# Authentication: Uses npm Trusted Publishers (OIDC) instead of a long-lived
# NPM_TOKEN secret. Before using this workflow, configure the package on
# npmjs.com as a Trusted Publisher linked to this repository:
#   https://www.npmjs.com/package/astro-auto-adapter/access
#
# No NPM_TOKEN secret is required once Trusted Publishers is configured.

on: workflow_dispatch

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Push commits/tags and create GitHub releases
      issues: write        # Comment on released issues
      pull-requests: write # Comment on released pull requests
      packages: write      # Publish GitHub Packages (if used)
      id-token: write      # Required for npm Trusted Publishers (OIDC) and provenance attestation

    steps:
      - name: Ensure workflow is running on main
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "This workflow must be run from the main branch." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          # registry-url is required to configure .npmrc for npm Trusted
          # Publishers (OIDC). Do NOT set NODE_AUTH_TOKEN — npm will obtain
          # a short-lived token from GitHub's OIDC provider automatically.
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        # npm Trusted Publishers requires npm 11.5.1+.
        run: |
          npm install --global npm@^11.5.1
          node --version
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre-release (test + build)
        run: pnpm pre-release

      - name: Release (version bump, changelog, GitHub release)
        id: release
        # semantic-release handles: version bump in package.json, CHANGELOG.md,
        # release commit + tag, and GitHub release creation.
        # npm publishing is intentionally disabled here (npmPublish: false in
        # package.json) and handled separately in the next step via OIDC.
        run: |
          # Capture the most-recent version tag before the release so we can
          # detect whether semantic-release actually created a new release.
          # Filter to vX.Y.Z tags only and sort by semantic version.
          BEFORE_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "")

          pnpm semantic-release

          # After semantic-release runs, check whether a new tag was created.
          # Fetch tags in case semantic-release pushed them to the remote only.
          git fetch --tags --quiet 2>/dev/null || true
          AFTER_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "")
          if [ -n "$AFTER_TAG" ] && [ "$BEFORE_TAG" != "$AFTER_TAG" ]; then
            echo "new_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_release=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine whether npm publish is needed
        id: publish-check
        run: |
          PACKAGE_NAME=$(node --input-type=module -e "import { readFileSync } from 'node:fs'; const pkg = JSON.parse(readFileSync('./package.json', 'utf8')); console.log(pkg.name);")
          LOCAL_VERSION=$(node --input-type=module -e "import { readFileSync } from 'node:fs'; const pkg = JSON.parse(readFileSync('./package.json', 'utf8')); console.log(pkg.version);")
          REMOTE_VERSION=$(npm view "$PACKAGE_NAME" version --silent 2>/dev/null || echo "")

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "remote_version=$REMOTE_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$LOCAL_VERSION" != "$REMOTE_VERSION" ]; then
            echo "publish_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_needed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Local version: $LOCAL_VERSION"
          echo "Remote version: ${REMOTE_VERSION:-<missing>}"

      - name: Publish to npm (OIDC Trusted Publishers)
        # Publish whenever the checked-out package version differs from npm.
        # This keeps reruns recoverable if semantic-release succeeded but npm publish failed.
        if: steps.publish-check.outputs.publish_needed == 'true'
        # Uses npm Trusted Publishers (OIDC) — no NPM_TOKEN secret is required.
        # npm automatically obtains a short-lived access token from GitHub's
        # OIDC provider, verified against the Trusted Publisher configuration
        # on npmjs.com. provenance is enabled in publishConfig (package.json).
        run: npm publish
